<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dark Pattern Detector — Full Report</title>

  <!-- jsPDF Library — PDF banane ke liye -->
  <script src="jspdf.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      padding: 16px;
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #222;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    #downloadPdf {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 12px;
    }
    #downloadPdf:hover {
      background: #222;
    }
    #content {
      padding-bottom: 24px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span>🔍</span>
    <h1>Dark Pattern Detector</h1>
  </div>

  <!-- PDF Download Button -->
  <button id="downloadPdf">📄 Download PDF Report</button>

  <!-- Findings Content -->
  <div id="content">
    <p style="color:#888;font-size:13px">Loading report...</p>
  </div>

  <!-- sidepanel.js load karo -->
  <script src="sidepanel.js"></script>

</body>
</html>
