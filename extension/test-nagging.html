<!DOCTYPE html>
<html>
<head><title>Nagging Test</title></head>
<body style="font-family:sans-serif;padding:40px;background:#f5f5f5">

  <h2>Welcome! Browse our store</h2>
  <p>Scroll around — a popup will keep appearing!</p>

  <!-- Nagging modal -->
  <div id="nag-modal" style="
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:white;padding:30px;
    border-radius:12px;
    box-shadow:0 4px 30px rgba(0,0,0,0.3);
    z-index:9999;text-align:center;
    width:320px">
    <h3>🎁 Subscribe & Save 20%!</h3>
    <p style="color:gray;margin:12px 0">Enter your email for exclusive deals</p>
    <input type="email" placeholder="your@email.com" style="
      width:100%;padding:10px;border:1px solid #ddd;
      border-radius:6px;margin-bottom:12px"/>
    <button style="background:#e53935;color:white;width:100%;padding:10px;border:none;border-radius:6px;cursor:pointer">
      Subscribe
    </button>
    <br/>
    <button aria-label="close" onclick="dismissModal()" style="
      background:none;border:none;color:gray;
      margin-top:10px;cursor:pointer;font-size:13px">
      ✕ Close
    </button>
  </div>

  <script>
    function dismissModal() {
      document.getElementById('nag-modal').style.display = 'none'
      // Reappear after 5 seconds — nagging!
      setTimeout(() => {
        document.getElementById('nag-modal').style.display = 'block'
      }, 5000)
    }
  </script>

</body>
</html>
