<!DOCTYPE html>
<html>
<head><title>Consent Test</title></head>
<body style="font-family:sans-serif;padding:40px;background:#f5f5f5">

  <h2>Welcome to our store!</h2>
  <p>Browse our products below.</p>

  <!-- Cookie banner -->
  <div id="cookie-banner" style="
    position:fixed;bottom:0;left:0;right:0;
    background:#1a1a1a;color:white;
    padding:20px;display:flex;
    justify-content:space-between;align-items:center;
    z-index:9999">
    <div style="font-size:14px;max-width:600px">
      🍪 We use cookies to improve your experience.
      By clicking Accept, you agree to our cookie policy.
    </div>
    <div style="display:flex;gap:12px;flex-shrink:0">
      <!-- Accept = big green button -->
      <button style="background:#22c55e;color:white;padding:10px 24px;border:none;border-radius:6px;font-size:14px;cursor:pointer">
        Accept All
      </button>
      <!-- Reject = tiny grey link — asymmetric! -->
      <a href="#" style="color:#888;font-size:11px;align-self:center">
        manage preferences
      </a>
    </div>
  </div>

</body>
</html>
