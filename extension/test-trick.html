<!DOCTYPE html>
<html>
<head><title>Trick Question Test</title></head>
<body>
  <h2>Checkout</h2>

  <!-- Trick question 1 — double negative -->
  <label>
    <input type="checkbox" checked />
    Uncheck to not receive promotional emails
  </label>

  <br/><br/>

  <!-- Trick question 2 — pre checked opt out -->
  <label>
    <input type="checkbox" checked />
    Remove me from special offers
  </label>

  <br/><br/>

  <!-- Normal checkbox — should NOT be flagged -->
  <label>
    <input type="checkbox" />
    Subscribe to newsletter
  </label>

</body>
</html>
